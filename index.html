<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>バーコードスキャナ</title>

  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
    }

    button {
      font-size: 32px;
      padding: 20px 40px;
      border: none;
      border-radius: 20px;
      background: #2563eb;
      color: white;
      margin-bottom: 20px;
    }

    video {
      width: 100%;
      max-width: 600px;
      border-radius: 20px;
      border: 4px solid #333;
      background: black;
    }

    li {
      list-style: none;
      background: white;
      margin: 10px auto;
      padding: 16px;
      max-width: 600px;
      border-radius: 12px;
      font-size: 28px;
    }
  </style>
</head>

<body>

  <h1>バーコードスキャナ</h1>

  <button id="startButton">
    スキャン開始
  </button>

  <br>

  <video id="video" autoplay playsinline muted></video>

  <h2>読み取り結果</h2>

  <ul id="resultList"></ul>

  <script>

    let codeReader;

    document
      .getElementById('startButton')
      .addEventListener('click', startScanner);

    async function startScanner() {

      try {

        codeReader =
          new ZXing.BrowserMultiFormatReader();

        const devices =
          await codeReader.listVideoInputDevices();

        if (devices.length === 0) {
          alert("カメラが見つかりません");
          return;
        }

const selectedDeviceId = devices.find(device =>
  device.label.toLowerCase().includes('back')
)?.deviceId || devices[0].deviceId;

        codeReader.decodeFromVideoDevice(
          selectedDeviceId,
          'video',
          (result, err) => {

            if (result) {

              addResult(result.text);

            }

          }
        );

      } catch (e) {

        console.error(e);

        alert(
          "カメラ起動エラー\nSafari設定を確認してください"
        );
      }
    }

    function addResult(text) {

      const li =
        document.createElement('li');

      li.textContent = text;

      document
        .getElementById('resultList')
        .prepend(li);
    }

  </script>

</body>
</html>
