<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>バーコードスキャナ</title>

  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    body{
      font-family:sans-serif;
      text-align:center;
      padding:20px;
      background:#f5f5f5;
    }

    button{
      font-size:28px;
      padding:16px 32px;
      border:none;
      border-radius:16px;
      background:#2563eb;
      color:white;
      margin-bottom:20px;
    }

    video{
      width:100%;
      max-width:500px;
      background:black;
      border-radius:16px;
    }

    li{
      list-style:none;
      background:white;
      margin:10px auto;
      padding:12px;
      border-radius:10px;
      max-width:500px;
      font-size:24px;
    }
  </style>
</head>

<body>

  <h1>バーコードスキャナ</h1>

  <button id="startButton">
    スキャン開始
  </button>

  <br>

  <video id="video" autoplay playsinline muted></video>

  <h2>読み取り結果</h2>

  <ul id="resultList"></ul>

  <script>

    let codeReader;
    let lastResult = "";

    document
      .getElementById("startButton")
      .addEventListener("click", async () => {

        try {

          const hints = new Map();

          hints.set(
            ZXing.DecodeHintType.POSSIBLE_FORMATS,
            [
              ZXing.BarcodeFormat.CODABAR
            ]
          );

          codeReader =
            new ZXing.BrowserMultiFormatReader(hints);

          const devices =
            await ZXing.BrowserCodeReader
              .listVideoInputDevices();

          const selectedDeviceId =
            devices[0].deviceId;

          codeReader.decodeFromVideoDevice(
            selectedDeviceId,
            'video',

            (result, err) => {

              if(result){

                if(result.text !== lastResult){

                  lastResult = result.text;

                  addResult(result.text);

                }
              }
            }
          );

        } catch(e){

          alert("カメラ起動エラー");

          console.error(e);
        }

      });

    function addResult(text){

      const li =
        document.createElement("li");

      li.textContent = text;

      document
        .getElementById("resultList")
        .prepend(li);
    }

  </script>

</body>
</html>
