<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>バーコードスキャナ</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body{
      font-family:sans-serif;
      text-align:center;
      background:#f5f5f5;
      padding:20px;
    }

    h1{
      font-size:42px;
    }

    button{
      font-size:28px;
      padding:16px 32px;
      border:none;
      border-radius:16px;
      background:#2563eb;
      color:white;
      margin-bottom:20px;
    }

    #reader{
      width:100%;
      max-width:500px;
      margin:auto;
    }

    li{
      list-style:none;
      background:white;
      margin:10px auto;
      padding:14px;
      border-radius:10px;
      max-width:500px;
      font-size:24px;
    }
  </style>
</head>

<body>

  <h1>バーコードスキャナ</h1>

  <button onclick="startScanner()">
    スキャン開始
  </button>

  <div id="reader"></div>

  <h2>読み取り結果</h2>

  <ul id="resultList"></ul>

  <script>

    let lastResult = "";

    function startScanner(){

      const html5QrCode =
        new Html5Qrcode("reader");

      html5QrCode.start(
        {
          facingMode: "environment"
        },
        {
  fps: 20,
  qrbox: {
    width: 350,
    height: 120
  },
  formatsToSupport: [
    Html5QrcodeSupportedFormats.CODABAR
  ]
},

        (decodedText) => {

          if(decodedText !== lastResult){

            lastResult = decodedText;

            addResult(decodedText);

          }

        }
      );
    }

    function addResult(text){

      const li =
        document.createElement("li");

      li.textContent = text;

      document
        .getElementById("resultList")
        .prepend(li);
    }

  </script>

</body>
</html>
