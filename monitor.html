<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>読み取りモニター</title>

<style>

body{

  margin:0;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  background:#7b1e3a;

  color:#FFFDF1;

  font-family:
    "Hiragino Sans",
    sans-serif;

  text-align:center;
}

.status{

  font-size:42px;

  margin-bottom:30px;
}

.barcode{

  font-size:96px;

  font-weight:bold;

  background:white;

  color:#111;

  padding:40px 70px;

  border-radius:24px;

  min-width:500px;
}

.time{

  margin-top:30px;

  font-size:28px;
}

</style>

</head>

<body>

<div class="status">
バーコードを読み取りました
</div>

<div
class="barcode"
id="barcode">

待機中

</div>

<div
class="time"
id="time">

</div>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQyPsj6PrjzSwNXFTcEOeIzBBErf9wG0GD_X5im71AOkixqDNQVNTLqXOtSNL5sNFyXfpgv71Pr8QHt/pub?output=csv";

let lastBarcode = "";

async function checkBarcode(){

  try{

    const response =
      await fetch(
        CSV_URL +
        "&t=" +
        Date.now()
      );

    const text =
      await response.text();

    const lines =
      text.trim().split("\n");

    const lastLine =
      lines[lines.length - 1];

    const values =
      lastLine.split(",");

    const barcode =
      values[1];

    if(
      barcode &&
      barcode != lastBarcode
    ){

      lastBarcode =
        barcode;

      document
        .getElementById("barcode")
        .textContent =
        barcode;

      document
        .getElementById("time")
        .textContent =
        new Date()
        .toLocaleTimeString();

    }

  }catch(e){

    console.log(e);

  }
}

checkBarcode();

setInterval(
  checkBarcode,
  2000
);

</script>

</body>
</html>
