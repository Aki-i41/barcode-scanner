<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQyPsj6PrjzSwNXFTcEOeIzBBErf9wG0GD_X5im71AOkixqDNQVNTLqXOtSNL5sNFyXfpgv71Pr8QHt/pub?output=csv";

let lastBarcode = "";

async function checkBarcode(){

  try{

    const response =
      await fetch(
        CSV_URL +
        "&t=" +
        Date.now()
      );

    const text =
      await response.text();

    const lines =
      text.trim().split("\n");

    const lastLine =
      lines[lines.length - 1];

    const values =
      lastLine.split(",");

    const barcode =
      values[1];

    console.log(barcode);

    if(
      barcode &&
      barcode != lastBarcode
    ){

      lastBarcode =
        barcode;

      document
        .getElementById("barcode")
        .textContent =
        barcode;

      document
        .getElementById("time")
        .textContent =
        new Date()
        .toLocaleTimeString();

    }

  }catch(e){

    console.log(e);

  }
}

checkBarcode();

setInterval(
  checkBarcode,
  2000
);

</script>
