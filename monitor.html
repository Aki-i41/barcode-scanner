<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQyPsj6PrjzSwNXFTcEOeIzBBErf9wG0GD_X5im71AOkixqDNQVNTLqXOtSNL5sNFyXfpgv71Pr8QHt/pub?output=csv";

let lastTimestamp = "";

async function checkBarcode(){

  try{

    const response =
      await fetch(
        CSV_URL +
        "&t=" +
        Date.now()
      );

    const text =
      await response.text();

    const lines =
      text.trim().split("\n");

    const lastLine =
      lines[lines.length - 1];

    const values =
      lastLine.split(",");

    const timestamp =
      values[0];

    if(
      timestamp &&
      timestamp != lastTimestamp
    ){

      lastTimestamp =
        timestamp;

      showComplete();
    }

  }catch(e){

    console.log(e);

  }
}

function showComplete(){

  document
    .getElementById("screen")
    .src =
    "complete.png";

  setTimeout(() => {

    document
      .getElementById("screen")
      .src =
      "waiting.png";

  }, 5000);
}

checkBarcode();

setInterval(
  checkBarcode,
  500
);

</script>
