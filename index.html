<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>バーコードスキャナ</title>

  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    body{
      font-family:sans-serif;
      text-align:center;
      padding:20px;
      background:#f5f5f5;
    }

    button{
      font-size:28px;
      padding:16px 32px;
      border:none;
      border-radius:16px;
      background:#2563eb;
      color:white;
      margin-bottom:20px;
    }

    video{
      width:100%;
      max-width:500px;
      background:black;
      border-radius:16px;
    }

    li{
      list-style:none;
      background:white;
      margin:10px auto;
      padding:12px;
      border-radius:10px;
      max-width:500px;
      font-size:24px;
    }
  </style>
</head>

<body>

  <h1>バーコードスキャナ</h1>

  <button id="startButton">
    スキャン開始
  </button>

  <br>

  <video id="video" autoplay playsinline muted></video>

  <h2>読み取り結果</h2>

  <ul id="resultList"></ul>

  <script>

    let lastResult = "";

    function playBeep(){

      try {

        const audioContext =
          new (window.AudioContext ||
          window.webkitAudioContext)();

        const oscillator =
          audioContext.createOscillator();

        const gainNode =
          audioContext.createGain();

        oscillator.connect(gainNode);

        gainNode.connect(
          audioContext.destination
        );

        oscillator.type = "sine";

        oscillator.frequency.value = 1200;

        gainNode.gain.value = 0.05;

        oscillator.start();

        oscillator.stop(
          audioContext.currentTime + 0.08
        );

      } catch(e){

        console.log(e);

      }
    }

    function addResult(text){

      const li =
        document.createElement("li");

      li.textContent = text;

      document
        .getElementById("resultList")
        .prepend(li);
    }

    function sendToSheet(barcode){

      const url =
        "https://script.google.com/macros/s/AKfycbxqV0zd4wFm6rZoB97yTy1sM4PTV0ohpzmH4Lf9sA836SqBBS8CGjBmNRAXloDqfQI1-w/exec"
        + "?barcode="
        + encodeURIComponent(barcode);

      fetch(url)
        .then(response => response.text())
        .then(data => console.log(data))
        .catch(error => console.log(error));
    }

    document
      .getElementById("startButton")
      .addEventListener("click", async () => {

        try {

          const hints = new Map();

          hints.set(
            ZXing.DecodeHintType.POSSIBLE_FORMATS,
            [
              ZXing.BarcodeFormat.CODABAR
            ]
          );

          const codeReader =
            new ZXing.BrowserMultiFormatReader(hints);

          codeReader.decodeFromConstraints(
            {
              video: {
                facingMode: "environment"
              }
            },
            "video",

            (result, err) => {

              if(result){

                const cleaned =
                  result.text.replace(/^A|A$/g, '');

                if(cleaned !== lastResult){

                  lastResult = cleaned;

                  playBeep();

                  sendToSheet(cleaned);

                  addResult(cleaned);

                }
              }
            }
          );

        } catch(e){

          console.error(e);

          alert(
            "カメラ起動エラー"
          );
        }

      });

  </script>

</body>
</html>
