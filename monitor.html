<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>読み取りモニター</title>

<style>

body{

  margin:0;

  height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  flex-direction:column;

  background:#7b1e3a;

  color:#FFFDF1;

  font-family:
    "Hiragino Sans",
    sans-serif;

  text-align:center;
}

.status{

  font-size:42px;

  margin-bottom:30px;
}

.barcode{

  font-size:96px;

  font-weight:bold;

  background:white;

  color:#111;

  padding:40px 70px;

  border-radius:24px;

  min-width:500px;
}

.time{

  margin-top:30px;

  font-size:28px;
}

</style>

</head>

<body>

<div class="status">
  バーコードを読み取りました
</div>

<div
  class="barcode"
  id="barcode">

  待機中1

</div>

<div
  class="time"
  id="time">

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwwPJCiAlec3_huaoXbTGkyz0lSIklynwh6YGX1zDZH6kN5D1uXP_SjqfpfuqwwTpYHOQ/exec";

let lastBarcode = "";

async function checkBarcode(){

  try{

    const response =
      await fetch(
        API_URL +
        "?t=" +
        Date.now()
      );

    const data =
      await response.json();

    console.log(data);

    if(
      data.barcode &&
      data.barcode != lastBarcode
    ){

      lastBarcode =
        data.barcode;

      document
        .getElementById("barcode")
        .textContent =
        data.barcode;

      document
        .getElementById("time")
        .textContent =
        new Date()
        .toLocaleTimeString();

    }

  }catch(e){

    console.log(e);

  }
}

checkBarcode();

setInterval(
  checkBarcode,
  2000
);

</script>

</body>
</html>
