<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
東総工業 スキャンモニター
</title>

<style>

body{

  margin:0;
  overflow:hidden;
  background:black;
}

#screen{

  width:100vw;
  height:100vh;

  object-fit:cover;
}

</style>

</head>

<body>

<img
  id="screen"
  src="https://raw.githubusercontent.com/Aki-i41/barcode-scanner/main/waiting.png">

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQyPsj6PrjzSwNXFTcEOeIzBBErf9wG0GD_X5im71AOkixqDNQVNTLqXOtSNL5sNFyXfpgv71Pr8QHt/pub?output=csv";

let lastTimestamp = null;

let isFirstLoad = true;

let isShowing = false;

async function checkBarcode(){

  try{

    const response =
      await fetch(
        CSV_URL +
        "&t=" +
        Date.now(),
        {
          cache:"no-store"
        }
      );

    const text =
      await response.text();

    const lines =
      text.trim().split("\n");

    const lastLine =
      lines[lines.length - 1];

    const values =
      lastLine.split(",");

    const timestamp =
      values[0];

    // 初回読み込みは反応しない
    if(isFirstLoad){

      lastTimestamp =
        timestamp;

      isFirstLoad = false;

      return;
    }

    // 新しい送信だけ反応
    if(
      timestamp &&
      timestamp != lastTimestamp &&
      !isShowing
    ){

      lastTimestamp =
        timestamp;

      showComplete();
    }

  }catch(e){

    console.log(e);

  }
}

function showComplete(){

  isShowing = true;

  document
    .getElementById("screen")
    .src =
    "https://raw.githubusercontent.com/Aki-i41/barcode-scanner/main/complete.png";

  setTimeout(() => {

    document
      .getElementById("screen")
      .src =
      "https://raw.githubusercontent.com/Aki-i41/barcode-scanner/main/waiting.png";

    isShowing = false;

  }, 5000);
}

checkBarcode();

setInterval(
  checkBarcode,
  1000
);

</script>

</body>
</html>
