<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>バーコードスキャナ</title>

  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    body{
      font-family:sans-serif;
      text-align:center;
      background:#f5f5f5;
      padding:20px;
    }

    h1{
      font-size:48px;
      margin-bottom:30px;
    }

    button{
      font-size:28px;
      padding:16px 36px;
      border:none;
      border-radius:16px;
      background:#2563eb;
      color:white;
      margin-bottom:20px;
    }

    video{
      width:100%;
      max-width:500px;
      border-radius:20px;
      background:black;
      object-fit:cover;

      filter: contrast(1.3) brightness(1.1);
    }

    h2{
      font-size:42px;
      margin-top:30px;
    }

    ul{
      padding:0;
      max-width:500px;
      margin:auto;
    }

    li{
      list-style:none;
      background:white;
      margin:10px 0;
      padding:16px;
      border-radius:12px;
      font-size:26px;
      word-break:break-all;
    }
  </style>
</head>

<body>

  <h1>バーコードスキャナ</h1>

  <button onclick="startScanner()">
    スキャン開始
  </button>

  <br>

  <video
    id="video"
    autoplay
    playsinline
    muted>
  </video>

  <h2>読み取り結果</h2>

  <ul id="resultList"></ul>

  <script>

    let codeReader;
    let lastResult = "";

    async function startScanner(){

      const hints = new Map();

      hints.set(
        ZXing.DecodeHintType.POSSIBLE_FORMATS,
        [
          ZXing.BarcodeFormat.CODABAR
        ]
      );

      codeReader =
        new ZXing.BrowserMultiFormatReader(hints);

      const devices =
        await ZXing.BrowserCodeReader
          .listVideoInputDevices();

      const selectedDeviceId =
        devices.find(device =>
          device.label
            .toLowerCase()
            .includes('back')
        )?.deviceId || devices[0].deviceId;

      codeReader.decodeFromVideoDevice(
        selectedDeviceId,
        'video',

        (result, err) => {

          if(result){

            const text = result.text;

            if(text !== lastResult){

              lastResult = text;

              addResult(text);

            }
          }
        }
      );
    }

    function addResult(text){

      const li =
        document.createElement("li");

      li.textContent = text;

      document
        .getElementById("resultList")
        .prepend(li);
    }

  </script>

</body>
</html>
