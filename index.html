<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>バーコードスキャナ</title>

  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      font-size: 32px;
    }

    video {
      width: 100%;
      max-width: 500px;
      border: 3px solid #333;
      border-radius: 12px;
      background: black;
    }

    button {
      font-size: 22px;
      padding: 12px 24px;
      margin: 20px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
    }

    ul {
      text-align: left;
      max-width: 500px;
      margin: auto;
      padding: 0;
    }

    li {
      list-style: none;
      background: white;
      margin: 8px 0;
      padding: 12px;
      border-radius: 8px;
      font-size: 20px;
    }
  </style>
</head>

<body>

  <h1>バーコードスキャナ</h1>

  <button onclick="startScanner()">
    スキャン開始
  </button>

  <br>

  <video id="video" playsinline></video>

  <h2>読み取り結果</h2>

  <ul id="resultList"></ul>

  <script>

    let codeReader;

    async function startScanner() {

      const hints = new Map();

      hints.set(
        ZXing.DecodeHintType.POSSIBLE_FORMATS,
        [
          ZXing.BarcodeFormat.CODABAR,
          ZXing.BarcodeFormat.CODE_39,
          ZXing.BarcodeFormat.CODE_128,
          ZXing.BarcodeFormat.EAN_13,
          ZXing.BarcodeFormat.EAN_8
        ]
      );

      codeReader =
        new ZXing.BrowserMultiFormatReader(hints);

      const videoInputDevices =
        await codeReader.listVideoInputDevices();

      const selectedDeviceId =
        videoInputDevices[
          videoInputDevices.length - 1
        ].deviceId;

      codeReader.decodeFromVideoDeviceContinuously(
        selectedDeviceId,
        'video',
        (result, err) => {

          if (result) {

            addResult(result.text);

          }

        }
      );
    }

    function addResult(text) {

      const li = document.createElement('li');

      li.textContent = text;

      document
        .getElementById('resultList')
        .prepend(li);
    }

  </script>

</body>
</html>
