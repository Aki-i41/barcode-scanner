<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>東総工業 スキャンモニター</title>

<style>

body{

  margin:0;
  overflow:hidden;
  background:black;
}

#screen{

  width:100vw;
  height:100vh;

  object-fit:cover;
}

</style>

</head>

<body>

<img
  id="screen"
  src="waiting.png">

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQyPsj6PrjzSwNXFTcEOeIzBBErf9wG0GD_X5im71AOkixqDNQVNTLqXOtSNL5sNFyXfpgv71Pr8QHt/pub?output=csv";

let lastBarcode = "";

async function checkBarcode(){

  try{

    const response =
      await fetch(
        CSV_URL +
        "&t=" +
        Date.now()
      );

    const text =
      await response.text();

    const lines =
      text.trim().split("\n");

    const lastLine =
      lines[lines.length - 1];

    const values =
      lastLine.split(",");

    const barcode =
      values[1];

    if(
      barcode &&
      barcode != lastBarcode
    ){

      lastBarcode =
        barcode;

      showComplete();
    }

  }catch(e){

    console.log(e);

  }
}

function showComplete(){

  document
    .getElementById("screen")
    .src =
    "complete.png";

  setTimeout(() => {

    document
      .getElementById("screen")
      .src =
      "waiting.png";

  }, 3000);
}

checkBarcode();

setInterval(
  checkBarcode,
  2000
);

</script>

</body>
</html>
